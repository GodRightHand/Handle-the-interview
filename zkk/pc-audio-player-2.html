
<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PC Audio Player</title>
<style>
:root {
  --bg: #ffffff;
  --surface: #f5f5f7;
  --fg: #1d1d1f;
  --muted: #6e6e73;
  --border: #d2d2d7;
  --accent: #0071e3;
  --accent-on: #ffffff;
  --accent-hover: #0077ed;
  --accent-active: #0066cc;
  --font-display: "SF Pro Display", "SF Pro Icons", "Helvetica Neue", Helvetica, Arial, sans-serif;
  --font-body: "SF Pro Text", "SF Pro Icons", "Helvetica Neue", Helvetica, Arial, sans-serif;
  --font-mono: "SF Mono", ui-monospace, "JetBrains Mono", Menlo, Monaco, Consolas, monospace;
  --radius-sm: 8px;
  --radius-md: 12px;
  --space-2: 8px;
  --space-4: 16px;
  --space-6: 24px;
  --motion-fast: 150ms;
  --motion-base: 220ms;
  --ease-standard: cubic-bezier(0.28, 0, 0.22, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-body);
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  -webkit-font-smoothing: antialiased;
}

.demo-content {
  text-align: center;
  color: #ffffff;
  padding: 40px;
}

.demo-content h1 {
  font-family: var(--font-display);
  font-size: 48px;
  font-weight: 600;
  letter-spacing: -0.02em;
  margin-bottom: 16px;
}

.demo-content p {
  font-size: 17px;
  color: rgba(255,255,255,0.6);
}

/* ─── Audio Player Bar ─── */
.audio-player {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 88px;
  background: rgba(30, 30, 35, 0.95);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid rgba(255,255,255,0.08);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 20px;
  z-index: 1000;
}

/* Left: Track Info */
.player-track {
  display: flex;
  align-items: center;
  gap: 12px;
  min-width: 200px;
  max-width: 260px;
}

.track-cover {
  width: 48px;
  height: 48px;
  border-radius: var(--radius-sm);
  object-fit: cover;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  flex-shrink: 0;
}

.track-info {
  display: flex;
  flex-direction: column;
  gap: 2px;
  overflow: hidden;
}

.track-title {
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 600;
  color: #ffffff;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.track-artist {
  font-family: var(--font-body);
  font-size: 12px;
  color: rgba(255,255,255,0.5);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* Center: Controls + Progress (left-right layout) */
.player-center {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 16px;
  max-width: 720px;
  margin: 0 auto;
}

.player-controls {
  display: flex;
  align-items: center;
  gap: 14px;
  flex-shrink: 0;
}

.control-btn {
  background: none;
  border: none;
  color: rgba(255,255,255,0.6);
  cursor: pointer;
  padding: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  transition: all var(--motion-fast) var(--ease-standard);
}

.control-btn:hover {
  color: #ffffff;
  transform: scale(1.05);
}

.control-btn:active {
  transform: scale(0.95);
}

.control-btn.play-btn {
  width: 34px;
  height: 34px;
  background: #ffffff;
  color: #1d1d1f;
}

.control-btn.play-btn:hover {
  background: #f0f0f5;
  transform: scale(1.08);
}

.control-btn.play-btn:active {
  transform: scale(0.95);
}

.control-btn svg {
  width: 16px;
  height: 16px;
}

.control-btn.small svg {
  width: 14px;
  height: 14px;
}

.control-btn.play-btn svg {
  width: 14px;
  height: 14px;
}

/* Progress Bar (right side of center) */
.progress-section {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 10px;
}

.time-label {
  font-family: var(--font-mono);
  font-size: 11px;
  color: rgba(255,255,255,0.45);
  min-width: 36px;
  text-align: center;
  font-variant-numeric: tabular-nums;
  flex-shrink: 0;
}

.progress-bar {
  flex: 1;
  height: 4px;
  background: rgba(255,255,255,0.15);
  border-radius: 2px;
  cursor: pointer;
  position: relative;
  overflow: visible;
}

.progress-fill {
  height: 100%;
  width: 35%;
  background: #ffffff;
  border-radius: 2px;
  position: relative;
  transition: width 0.1s linear;
}

.progress-thumb {
  position: absolute;
  right: -6px;
  top: 50%;
  transform: translateY(-50%);
  width: 10px;
  height: 10px;
  background: #ffffff;
  border-radius: 50%;
  box-shadow: 0 1px 4px rgba(0,0,0,0.25);
  opacity: 0;
  transition: opacity var(--motion-fast) var(--ease-standard);
}

.progress-bar:hover .progress-thumb {
  opacity: 1;
}

.progress-bar:hover {
  height: 6px;
}

.progress-bar:hover .progress-fill {
  height: 6px;
}

/* Right: Actions + Volume */
.player-actions {
  display: flex;
  align-items: center;
  gap: 4px;
  min-width: 220px;
  justify-content: flex-end;
}

.speed-btn {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  color: rgba(255,255,255,0.55);
  background: rgba(255,255,255,0.1);
  border: none;
  padding: 4px 9px;
  border-radius: 4px;
  cursor: pointer;
  transition: all var(--motion-fast) var(--ease-standard);
  margin-right: 4px;
}

.speed-btn:hover {
  background: rgba(255,255,255,0.15);
  color: #ffffff;
}

.action-btn {
  background: none;
  border: none;
  color: rgba(255,255,255,0.5);
  cursor: pointer;
  padding: 7px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  border-radius: var(--radius-sm);
  transition: all var(--motion-fast) var(--ease-standard);
}

.action-btn:hover {
  color: rgba(255,255,255,0.9);
  background: rgba(255,255,255,0.08);
}

.action-btn.liked {
  color: #ff4757;
}

.action-btn svg {
  width: 15px;
  height: 15px;
}

.action-btn span {
  font-family: var(--font-body);
  font-size: 12px;
}

.volume-control {
  display: flex;
  align-items: center;
  gap: 6px;
  padding-left: 12px;
  border-left: 1px solid rgba(255,255,255,0.1);
  margin-left: 4px;
}

.volume-btn {
  background: none;
  border: none;
  color: rgba(255,255,255,0.5);
  cursor: pointer;
  padding: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 4px;
  transition: all var(--motion-fast) var(--ease-standard);
}

.volume-btn:hover {
  color: #ffffff;
}

.volume-btn svg {
  width: 15px;
  height: 15px;
}

.volume-slider {
  width: 76px;
  height: 4px;
  background: rgba(255,255,255,0.2);
  border-radius: 2px;
  cursor: pointer;
  position: relative;
  overflow: visible;
}

.volume-fill {
  height: 100%;
  width: 70%;
  background: rgba(255,255,255,0.7);
  border-radius: 2px;
}

.volume-thumb {
  position: absolute;
  left: 70%;
  top: 50%;
  transform: translate(-50%, -50%);
  width: 10px;
  height: 10px;
  background: #ffffff;
  border-radius: 50%;
  box-shadow: 0 1px 4px rgba(0,0,0,0.25);
  opacity: 0;
  transition: opacity var(--motion-fast) var(--ease-standard);
}

.volume-slider:hover .volume-thumb {
  opacity: 1;
}
</style>
</head>
<body>

<div class="demo-content">
  <h1>Music Player</h1>
  <p>点击播放按钮开始演示音频播放器</p>
</div>

<!-- PC Audio Player Bar -->
<footer class="audio-player" role="region" aria-label="音频播放控制">

  <!-- Left: Track Info -->
  <div class="player-track">
    <img class="track-cover" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%23667eea'/%3E%3Cstop offset='100%25' stop-color='%23764ba2'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect fill='url(%23g)' width='48' height='48' rx='8'/%3E%3Cpath d='M20 16 L32 24 L20 32 Z' fill='white'/%3E%3C/svg%3E" alt="专辑封面">
    <div class="track-info">
      <span class="track-title">午夜巴黎</span>
      <span class="track-artist">David Bowie</span>
    </div>
  </div>

  <!-- Center: Controls + Progress (horizontal) -->
  <div class="player-center">
    <!-- Left side: playback controls -->
    <div class="player-controls">
      <button class="control-btn small" aria-label="上一首" title="上一首">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M6 6a1 1 0 0 1 1 1v10a1 1 0 1 1-2 0V7a1 1 0 0 1 1-1zm12.707.293a1 1 0 0 1 0 1.414L13.414 13l5.293 5.293a1 1 0 0 1-1.414 1.414l-6-6a1 1 0 0 1 0-1.414l6-6a1 1 0 0 1 1.414 0z"/>
        </svg>
      </button>

      <button class="control-btn play-btn" aria-label="播放" title="播放">
        <svg viewBox="0 0 24 24" fill="currentColor" class="play-icon">
          <path d="M8 5v14l11-7z"/>
        </svg>
        <svg viewBox="0 0 24 24" fill="currentColor" class="pause-icon" style="display:none">
          <path d="M6 4h4v16H6zM14 4h4v16h-4z"/>
        </svg>
      </button>

      <button class="control-btn small" aria-label="下一首" title="下一首">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M18 6a1 1 0 0 1 1 1v10a1 1 0 1 1-2 0V7a1 1 0 0 1 1-1zM5.293 6.293a1 1 0 0 1 1.414 0l6 6a1 1 0 0 1 0 1.414l-6 6a1 1 0 0 1-1.414-1.414L10.586 13 5.293 7.707a1 1 0 0 1 0-1.414z"/>
        </svg>
      </button>
    </div>

    <!-- Right side: progress + times -->
    <div class="progress-section">
      <span class="time-label">1:24</span>
      <div class="progress-bar" role="slider" aria-label="播放进度" aria-valuenow="35" aria-valuemin="0" aria-valuemax="100" tabindex="0">
        <div class="progress-fill" style="width: 35%">
          <div class="progress-thumb"></div>
        </div>
      </div>
      <span class="time-label">4:02</span>
    </div>
  </div>

  <!-- Right: Actions + Volume -->
  <div class="player-actions">
    <button class="speed-btn" title="播放倍速">1x</button>

    <button class="action-btn" aria-label="转发" title="转发">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/>
        <polyline points="16 6 12 2 8 6"/>
        <line x1="12" y1="2" x2="12" y2="15"/>
      </svg>
    </button>

    <button class="action-btn" aria-label="评论" title="评论">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      <span>2.3k</span>
    </button>

    <button class="action-btn liked" aria-label="已赞" title="取消点赞">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
      </svg>
      <span>18.6k</span>
    </button>

    <div class="volume-control">
      <button class="volume-btn" aria-label="音量" title="音量">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3a9 9 0 0 1-3.54 7.07l-.71-.71A7 7 0 0 0 14 12a7 7 0 0 0 1.76-4.36l-.71-.71a9 9 0 0 1 3.54 7.07z"/>
        </svg>
      </button>
      <div class="volume-slider" role="slider" aria-label="音量调节" aria-valuenow="70" aria-valuemin="0" aria-valuemax="100" tabindex="0">
        <div class="volume-fill">
          <div class="volume-thumb"></div>
        </div>
      </div>
    </div>
  </div>

</footer>

<script>
// Toggle play/pause
document.querySelector('.play-btn').addEventListener('click', function () {
  const playIcon = this.querySelector('.play-icon');
  const pauseIcon = this.querySelector('.pause-icon');
  const isPlaying = playIcon.style.display === 'none';

  if (isPlaying) {
    playIcon.style.display = 'block';
    pauseIcon.style.display = 'none';
    this.setAttribute('aria-label', '播放');
  } else {
    playIcon.style.display = 'none';
    pauseIcon.style.display = 'block';
    this.setAttribute('aria-label', '暂停');
  }
});

// Toggle like
document.querySelector('.action-btn.liked').addEventListener('click', function () {
  const isLiked = this.classList.contains('liked');
  const svg = this.querySelector('svg');

  if (isLiked) {
    this.classList.remove('liked');
    svg.setAttribute('fill', 'none');
    svg.setAttribute('stroke', 'currentColor');
    svg.setAttribute('stroke-width', '2');
  } else {
    this.classList.add('liked');
    svg.setAttribute('fill', 'currentColor');
    svg.removeAttribute('stroke');
    svg.removeAttribute('stroke-width');
  }
});

// Volume slider drag
const volumeSlider = document.querySelector('.volume-slider');
const volumeFill = volumeSlider.querySelector('.volume-fill');

volumeSlider.addEventListener('click', function (e) {
  const rect = this.getBoundingClientRect();
  const pct = Math.round(((e.clientX - rect.left) / rect.width) * 100);
  volumeFill.style.width = pct + '%';
  volumeSlider.setAttribute('aria-valuenow', pct);
});
</script>

</body>
</html>
